          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjeXFnY2ZqbXpna21rY3p1eWR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NTg2MzUsImV4cCI6MjA5ODAzNDYzNX0.08YZeLbbo6oneL-q3eUNuQuOVbe8vll3EPckxAsqqxQ
