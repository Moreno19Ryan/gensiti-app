name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Type check, lint, and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
        env:
          # Prioritas #3 NATIVE_READINESS_AUDIT.md: contract test lib/authz-rpc.contract.test.ts
          # memanggil RPC otorisasi murni di Supabase lewat ANON KEY -- bukan secret, sama
          # persis yang sudah ter-embed di bundle client browser (lihat lib/supabase.ts).
          # Tanpa env ini test tsb di-skip diam-diam (lihat describe.skipIf di file itu).
